name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Which version component to bump"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.4'
          bundler-cache: true

      - name: Run tests and lint
        run: ./gradlew test lint

      - name: Compute new version
        id: version
        env:
          BUMP_TYPE: ${{ inputs.bump_type }}
        run: |
          GRADLE_FILE="app/build.gradle.kts"

          VERSION_CODE=$(grep -E '^\s+versionCode\s*=' "$GRADLE_FILE" | grep -oE '[0-9]+')
          VERSION_NAME=$(grep -E '^\s+versionName\s*=' "$GRADLE_FILE" | grep -oE '"[^"]+"' | tr -d '"')

          if [[ -z "$VERSION_CODE" || -z "$VERSION_NAME" ]]; then
            echo "Error: Could not parse version from $GRADLE_FILE" >&2
            exit 1
          fi

          if [[ "$VERSION_NAME" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)(-[0-9]+)?$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"
          else
            echo "Error: Cannot parse versionName '$VERSION_NAME'. Expected: major.minor.patch" >&2
            exit 1
          fi

          case "$BUMP_TYPE" in
            major) NEW_VERSION_NAME="$((MAJOR + 1)).0.0" ;;
            minor) NEW_VERSION_NAME="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) NEW_VERSION_NAME="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac

          NEW_VERSION_CODE=$((VERSION_CODE + 1))

          echo "version_name=$NEW_VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$NEW_VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "old_version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "old_version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Update version in build.gradle.kts
        env:
          OLD_CODE: ${{ steps.version.outputs.old_version_code }}
          NEW_CODE: ${{ steps.version.outputs.version_code }}
          OLD_NAME: ${{ steps.version.outputs.old_version_name }}
          NEW_NAME: ${{ steps.version.outputs.version_name }}
        run: |
          GRADLE_FILE="app/build.gradle.kts"

          perl -i -pe "s/versionCode = ${OLD_CODE}/versionCode = ${NEW_CODE}/" "$GRADLE_FILE"
          perl -i -pe "s/versionName = \"${OLD_NAME}\"/versionName = \"${NEW_NAME}\"/" "$GRADLE_FILE"

          UPDATED_CODE=$(grep -E '^\s+versionCode\s*=' "$GRADLE_FILE" | grep -oE '[0-9]+')
          UPDATED_NAME=$(grep -E '^\s+versionName\s*=' "$GRADLE_FILE" | grep -oE '"[^"]+"' | tr -d '"')

          if [[ "$UPDATED_CODE" != "$NEW_CODE" || "$UPDATED_NAME" != "$NEW_NAME" ]]; then
            echo "Error: Version update verification failed" >&2
            echo "Expected: versionCode=$NEW_CODE, versionName=$NEW_NAME" >&2
            echo "Got: versionCode=$UPDATED_CODE, versionName=$UPDATED_NAME" >&2
            exit 1
          fi

      - name: Decode upload keystore
        env:
          UPLOAD_KEYSTORE_BASE64: ${{ secrets.UPLOAD_KEYSTORE_BASE64 }}
        run: |
          echo "$UPLOAD_KEYSTORE_BASE64" | base64 --decode > upload.keystore

      - name: Create keystore.properties
        env:
          UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
          UPLOAD_KEY_ALIAS: ${{ secrets.UPLOAD_KEY_ALIAS }}
          UPLOAD_KEY_PASSWORD: ${{ secrets.UPLOAD_KEY_PASSWORD }}
        run: |
          cat > keystore.properties <<EOF
          storeFile=../upload.keystore
          storePassword=$UPLOAD_KEYSTORE_PASSWORD
          keyAlias=$UPLOAD_KEY_ALIAS
          keyPassword=$UPLOAD_KEY_PASSWORD
          EOF

      - name: Write Play Store service account key
        env:
          PLAY_STORE_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
        run: |
          printf '%s' "$PLAY_STORE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/play-store-key.json"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and tag
        env:
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
        run: |
          NEW_TAG="v${VERSION_NAME}"
          git add app/build.gradle.kts
          git commit -m "Release ${NEW_TAG}"
          git tag "$NEW_TAG"

      - name: Push commit and tag
        env:
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
        run: |
          git push origin HEAD:main "v${VERSION_NAME}"

      - name: Deploy to Google Play Store
        env:
          PLAY_STORE_JSON_KEY_FILE: ${{ runner.temp }}/play-store-key.json
        run: bundle exec fastlane android deploy

  screenshots:
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.4'
          bundler-cache: true

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run screengrab on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          disable-animations: true
          script: bundle exec fastlane android screenshots

      - name: Commit screenshots
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update screenshots"
          file_pattern: "fastlane/metadata/android/**/images/phoneScreenshots/*.png"
          branch: main
