name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Which version component to bump"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  bump:
    uses: ./.github/workflows/bump-version.yml
    with:
      bump_type: ${{ inputs.bump_type }}

  publish:
    runs-on: ubuntu-latest
    needs: bump

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.5'
          bundler-cache: true

      - name: Decode upload keystore
        env:
          UPLOAD_KEYSTORE_BASE64: ${{ secrets.UPLOAD_KEYSTORE_BASE64 }}
        run: |
          echo "$UPLOAD_KEYSTORE_BASE64" | base64 --decode > upload.keystore

      - name: Create keystore.properties
        env:
          UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
          UPLOAD_KEY_ALIAS: ${{ secrets.UPLOAD_KEY_ALIAS }}
          UPLOAD_KEY_PASSWORD: ${{ secrets.UPLOAD_KEY_PASSWORD }}
        run: |
          cat > keystore.properties <<EOF
          storeFile=../upload.keystore
          storePassword=$UPLOAD_KEYSTORE_PASSWORD
          keyAlias=$UPLOAD_KEY_ALIAS
          keyPassword=$UPLOAD_KEY_PASSWORD
          EOF

      - name: Write Play Store service account key
        env:
          PLAY_STORE_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
        run: |
          printf '%s' "$PLAY_STORE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/play-store-key.json"

      - name: Deploy to Google Play Store
        env:
          PLAY_STORE_JSON_KEY_FILE: ${{ runner.temp }}/play-store-key.json
        run: bundle exec fastlane android deploy

  screenshots:
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.5'
          bundler-cache: true

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run screengrab on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          disable-animations: true
          script: bundle exec fastlane android screenshots

      - name: Commit screenshots
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update screenshots"
          file_pattern: "fastlane/metadata/android/**/images/phoneScreenshots/*.png"
          branch: main
